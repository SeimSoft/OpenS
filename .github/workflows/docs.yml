name: Deploy Documentation

on:
  push:
    branches:
      - master
      - main

  # Allow running manually from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.11

      - name: Install System Dependencies for PyQt
        run: sudo apt-get update && sudo apt-get install -y xvfb libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 libxcb-cursor0

      - name: Install Dependencies
        run: uv sync

      - name: Generate Badges
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mkdir -p docs/badges
          xvfb-run -a uv run pytest --cov=src/opens_suite --cov-report=xml tests/ || true
          
          # Safely extract coverage percentage
          COV_RAW=$(uv run coverage report | grep '^TOTAL' | awk '{print $4}' | tr -d '%' || true)
          if [[ "$COV_RAW" =~ ^[0-9]+$ ]]; then COV="$COV_RAW"; else COV="0"; fi
          if [ "$COV" -ge 80 ]; then COLOR="brightgreen"; elif [ "$COV" -ge 60 ]; then COLOR="yellow"; elif [ "$COV" -ge 50 ]; then COLOR="orange"; else COLOR="red"; fi
          curl -s "https://img.shields.io/badge/coverage-${COV}%25-${COLOR}" -o docs/badges/coverage.svg

          # Safely extract Pylint score
          uv run pylint src/opens_suite | tee pylint.txt || true
          SCORE_RAW=$(grep -Eo 'Your code has been rated at [-0-9.]+/10' pylint.txt | grep -Eo '[-0-9.]+' | head -1 || true)
          if [[ "$SCORE_RAW" =~ ^[-0-9.]+$ ]]; then SCORE="$SCORE_RAW"; else SCORE="0"; fi
          SCORE_INT=${SCORE%.*}
          if [[ ! "$SCORE_INT" =~ ^[-0-9]+$ ]]; then SCORE_INT="0"; fi
          if [ "$SCORE_INT" -ge 9 ]; then COLOR="brightgreen"; elif [ "$SCORE_INT" -ge 7 ]; then COLOR="yellow"; elif [ "$SCORE_INT" -ge 5 ]; then COLOR="orange"; else COLOR="red"; fi
          curl -s "https://img.shields.io/badge/pylint-${SCORE}/10-${COLOR}" -o docs/badges/pylint.svg

      - name: Build MkDocs Site
        run: uv run zensical build


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
