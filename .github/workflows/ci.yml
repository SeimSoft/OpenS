name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.11

      - name: Install System Dependencies for PyQt
        run: sudo apt-get update && sudo apt-get install -y xvfb libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 libxcb-cursor0


      - name: Install Dependencies
        run: uv sync

      - name: Setup Xyce
        run: ./scripts/setup_xyce.sh

      - name: Run PyLint
        run: uv run pylint src/opens_suite tests || true

      - name: Run Tests & Coverage
        run: xvfb-run -a uv run pytest --cov=src/opens_suite --cov-report=xml --cov-report=term tests/
        continue-on-error: true

      - name: Build MkDocs Documentation
        run: uv run zensical build

