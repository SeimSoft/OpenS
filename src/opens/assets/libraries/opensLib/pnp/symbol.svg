<svg xmlns="http://www.w3.org/2000/svg" width="80" height="60" viewBox="0 0 80 60">
  <defs>
    <style>
      .pin { fill: none; stroke: none; }
      .symbol { fill: none; stroke: black; stroke-width: 2; stroke-linecap: round; }
      .label { font-family: Arial; font-size: 8px; fill: blue; }
      .value { font-family: Arial; font-size: 8px; fill: black; }
    </style>
    <opens:param xmlns:opens="http://opens-schematic.org" name="MODEL" value="Q" />
    <opens:symbol xmlns:opens="http://opens-schematic.org" prefix="Q" bindkey="w" category="Transistors" />
    <opens:xyce xmlns:opens="http://opens-schematic.org" template="Q{name} {pin_c} {pin_b} {pin_e} {MODEL}" />
  </defs>
  <!-- PNP symbol: arrow on emitter inwards -->
  <path class="symbol" d="M 20 10 L 60 30 L 20 50 Z" />
  <path class="symbol" d="M 40 30 L 55 30" />
  <path class="symbol" d="M 30 40 L 40 30 L 30 20" />
  <circle class="symbol" cx="40" cy="30" r="2" />

  <!-- Pins: collector left, base top, emitter right -->
  <circle class="pin" id="pin_c" cx="0" cy="30" r="2" />
  <circle class="pin" id="pin_b" cx="40" cy="0" r="2" />
  <circle class="pin" id="pin_e" cx="80" cy="30" r="2" />

  <text x="82" y="12" class="label">{name}</text>
  <text x="82" y="28" class="value">{MODEL}</text>
</svg>
