<svg xmlns="http://www.w3.org/2000/svg" width="100" height="40" viewBox="-80 -20 100 40">
  <defs>
    <style>
      .pin { fill: none; stroke: none; }
      .symbol { fill: red; stroke: red; stroke-width: 1; }
    </style>
    <opens:symbol xmlns:opens="http://opens-schematic.org" prefix="PIN" category="IO" />
    <opens:pin xmlns:opens="http://opens-schematic.org" id="pin_1" net="{name}" />
  </defs>
  <!-- Bi-Directional Pin Symbol (Diamond) -->
  <polygon class="symbol" points="-20,0 -10,-5 0,0 -10,5" />
  
  <!-- Pin (Connection on the right tip at 0,0) -->
  <circle id="pin_1" cx="0" cy="0" r="2" class="pin" />
  
  <!-- Label: Right aligned to -25 -->
  <text x="-25" y="-6" font-size="12px" fill="red" text-anchor="end">{name}</text>
</svg>
