<svg xmlns="http://www.w3.org/2000/svg" width="40" height="60" viewBox="0 0 40 60">
  <defs>
    <style>
      .pin { fill: none; stroke: none; }
      .symbol { fill: none; stroke: black; stroke-width: 2; stroke-linecap: round; }
      .plus { stroke: black; stroke-width: 1; stroke-linecap: round; }
      .label { font-family: Arial; font-size: 8px; fill: blue; }
      .value { font-family: Arial; font-size: 8px; fill: black; }
    </style>
    <opens:param xmlns:opens="http://opens-schematic.org" name="V" value="1" />
    <opens:param xmlns:opens="http://opens-schematic.org" name="VAC" value="0" />
    <opens:param xmlns:opens="http://opens-schematic.org" name="SUPPORTS_CURRENT" value="True" />
    <opens:symbol xmlns:opens="http://opens-schematic.org" prefix="V" bindkey="v" category="Sources" />
    <opens:xyce xmlns:opens="http://opens-schematic.org" template="V{name} {pin_plus} {pin_minus} dc {V} ac {VAC}" />
  </defs>
  <!-- DC Source -->
  <circle class="symbol" cx="20" cy="30" r="15" />
  <path class="symbol" d="M 20 0 L 20 15" stroke-linecap="round"/>
  <path class="symbol" d="M 20 45 L 20 60" stroke-linecap="round"/>
  
  <!-- Plus Sign -->
  <path class="plus" d="M 15 22 L 25 22 M 20 17 L 20 27" stroke-linecap="round"/>
  <!-- Minus Sign -->
  <path class="plus" d="M 15 38 L 25 38" stroke-linecap="round"/>

  <!-- Pins -->
  <circle class="pin" id="pin_plus" cx="20" cy="0" r="2" />
  <circle class="pin" id="pin_minus" cx="20" cy="60" r="2" />

  <!-- Text Placeholders -->
  <text x="35" y="25" class="label">{name}</text>
  <text x="35" y="45" class="value">{V}</text>
  <text x="35" y="55" class="value">{Vac}</text>
  <text x="35" y="60" class="value" style="fill: green;">{V{name}:i}</text>
</svg>
