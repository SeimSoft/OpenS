<svg xmlns="http://www.w3.org/2000/svg" width="40" height="60" viewBox="0 0 40 60">
  <defs>
    <style>
      .pin { fill: none; stroke: none; }
      .symbol { fill: none; stroke: black; stroke-width: 2; stroke-linecap: round; }
      .label { font-family: Arial; font-size: 8px; fill: blue; }
      .value { font-family: Arial; font-size: 8px; fill: black; }
    </style>
  <!-- SIN(VO VA FREQ TD THETA PHASE) -->
  <opens:param xmlns:opens="http://opens-schematic.org" name="VO" value="0" />
  <opens:param xmlns:opens="http://opens-schematic.org" name="VA" value="1" />
  <opens:param xmlns:opens="http://opens-schematic.org" name="FREQ" value="1k" />
  <opens:param xmlns:opens="http://opens-schematic.org" name="TD" value="0" />
  <opens:param xmlns:opens="http://opens-schematic.org" name="THETA" value="0" />
  <opens:param xmlns:opens="http://opens-schematic.org" name="PHASE" value="0" />
    <opens:param xmlns:opens="http://opens-schematic.org" name="SUPPORTS_CURRENT" value="True" />
  <opens:symbol xmlns:opens="http://opens-schematic.org" prefix="V" bindkey="s" category="Sources" />
  <opens:xyce xmlns:opens="http://opens-schematic.org" template="V{name} {pin_plus} {pin_minus} SIN({VO} {VA} {FREQ} {TD} {THETA} {PHASE})" />
  </defs>
  <!-- Sine Source (V-source style like vdc.svg, but sine glyph inside) -->
  <circle class="symbol" cx="20" cy="30" r="15" />
  <path class="symbol" d="M 20 0 L 20 15" stroke-linecap="round"/>
  <path class="symbol" d="M 20 45 L 20 60" stroke-linecap="round"/>

  <!-- Sine wave glyph inside the circle -->
  <path class="symbol" d="M 8 30 C 12 20, 16 40, 20 30 C 24 20, 28 40, 32 30" />

  <!-- Pins (top and bottom) -->
  <circle class="pin" id="pin_plus" cx="20" cy="0" r="2" />
  <circle class="pin" id="pin_minus" cx="20" cy="60" r="2" />

  <!-- Text Placeholders (aligned like vdc.svg) -->
  <text x="35" y="25" class="label">{name}</text>
  <text x="35" y="45" class="value">SIN</text>
  <text x="35" y="60" class="value" style="fill: green;">{V{name}:i}</text>
</svg>
