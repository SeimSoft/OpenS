<svg xmlns="http://www.w3.org/2000/svg" width="80" height="180" viewBox="0 0 80 180">
  <defs>
    <style>
      .pin { fill: none; stroke: none; }
      .symbol { fill: #f0f0f0; stroke: black; stroke-width: 2; stroke-linecap: round; }
      .label { font-family: Arial; font-size: 8px; fill: blue; }
      .pinlabel { font-family: Arial; font-size: 8px; fill: #666; }
      .value { font-family: Arial; font-size: 8px; fill: black; }
    </style>
    <opens:param xmlns:opens="http://opens-schematic.org" name="MODEL_NAME" value="py_res" />
    <opens:symbol xmlns:opens="http://opens-schematic.org" prefix="N" bindkey="n" category="Python" />
    <opens:xyce xmlns:opens="http://opens-schematic.org" template="N{name} {PA0} {PA1} {PA2} {PA3} {PA4} {PA5} {PA6} {PA7} {PA8} {PA9} {PA10} {PA11} {PA12} {PA13} {PA14} {PA15} {MODEL_NAME}" />
  </defs>
  
  <!-- IC Body -->
  <rect class="symbol" x="10" y="10" width="60" height="160" rx="4" ry="4" />
  <path d="M 35 10 A 5 5 0 0 0 45 10" fill="none" stroke="black" stroke-width="1.5" />

  <!-- Pin Lines -->
  <!-- Left -->
  <line x1="0" y1="20" x2="10" y2="20" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="40" x2="10" y2="40" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="60" x2="10" y2="60" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="80" x2="10" y2="80" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="100" x2="10" y2="100" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="120" x2="10" y2="120" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="140" x2="10" y2="140" stroke="black" stroke-width="1.5" />
  <line x1="0" y1="160" x2="10" y2="160" stroke="black" stroke-width="1.5" />
  <!-- Right -->
  <line x1="70" y1="20" x2="80" y2="20" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="40" x2="80" y2="40" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="60" x2="80" y2="60" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="80" x2="80" y2="80" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="100" x2="80" y2="100" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="120" x2="80" y2="120" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="140" x2="80" y2="140" stroke="black" stroke-width="1.5" />
  <line x1="70" y1="160" x2="80" y2="160" stroke="black" stroke-width="1.5" />

  <!-- Pins -->
  <circle class="pin" id="PA0" cx="0"  cy="20" r="2" />
  <circle class="pin" id="PA1" cx="0"  cy="40" r="2" />
  <circle class="pin" id="PA2" cx="0"  cy="60" r="2" />
  <circle class="pin" id="PA3" cx="0"  cy="80" r="2" />
  <circle class="pin" id="PA4" cx="0"  cy="100" r="2" />
  <circle class="pin" id="PA5" cx="0"  cy="120" r="2" />
  <circle class="pin" id="PA6" cx="0"  cy="140" r="2" />
  <circle class="pin" id="PA7" cx="0"  cy="160" r="2" />

  <circle class="pin" id="PA8" cx="80" cy="160" r="2" />
  <circle class="pin" id="PA9" cx="80" cy="140" r="2" />
  <circle class="pin" id="PA10" cx="80" cy="120" r="2" />
  <circle class="pin" id="PA11" cx="80" cy="100" r="2" />
  <circle class="pin" id="PA12" cx="80" cy="80" r="2" />
  <circle class="pin" id="PA13" cx="80" cy="60" r="2" />
  <circle class="pin" id="PA14" cx="80" cy="40" r="2" />
  <circle class="pin" id="PA15" cx="80" cy="20" r="2" />

  <!-- Labels -->
  <text x="5" y="5" class="label">{name}</text>
  <text x="40" y="95" class="value" text-anchor="middle">{MODEL_NAME}</text>
  
  <text x="12" y="23" class="pinlabel">PA0</text>
  <text x="12" y="43" class="pinlabel">PA1</text>
  <text x="12" y="63" class="pinlabel">PA2</text>
  <text x="12" y="83" class="pinlabel">PA3</text>
  <text x="12" y="103" class="pinlabel">PA4</text>
  <text x="12" y="123" class="pinlabel">PA5</text>
  <text x="12" y="143" class="pinlabel">PA6</text>
  <text x="12" y="163" class="pinlabel">PA7</text>
  
  <text x="68" y="163" class="pinlabel" text-anchor="end">PA8</text>
  <text x="68" y="143" class="pinlabel" text-anchor="end">PA9</text>
  <text x="68" y="123" class="pinlabel" text-anchor="end">PA10</text>
  <text x="68" y="103" class="pinlabel" text-anchor="end">PA11</text>
  <text x="68" y="83" class="pinlabel" text-anchor="end">PA12</text>
  <text x="68" y="63" class="pinlabel" text-anchor="end">PA13</text>
  <text x="68" y="43" class="pinlabel" text-anchor="end">PA14</text>
  <text x="68" y="23" class="pinlabel" text-anchor="end">PA15</text>
</svg>
