<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <style>
      .pin { fill: none; stroke: none; }
      .symbol { fill: none; stroke: black; stroke-width: 2; stroke-linecap: round; }
      .label { font-family: Arial; font-size: 8px; fill: blue; }
      .net_label { font-family: Arial; font-size: 8px; fill: red; }
    </style>
    <opens:symbol xmlns:opens="http://opens-schematic.org" prefix="VDD" bindkey="" category="Misc" />
    <opens:xyce xmlns:opens="http://opens-schematic.org" template="" />
    <opens:pin xmlns:opens="http://opens-schematic.org" id="pin_1" net_override="{NET_NAME}" />
  </defs>
  
  <opens:parameter xmlns:opens="http://opens-schematic.org" name="NET_NAME" default="VCC" />

  <!-- VDD Symbol (Bar with line) -->
  <path class="symbol" d="M 20 40 L 20 15" />
  <path class="symbol" d="M 5 15 L 35 15" />
  
  <!-- Pin (Bottom) -->
  <circle class="pin" id="pin_1" cx="20" cy="40" r="2" />

  <text x="25" y="10" class="net_label">{NET_NAME}</text>
</svg>
