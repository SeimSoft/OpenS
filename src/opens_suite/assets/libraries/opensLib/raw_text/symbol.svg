<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:opens="http://opens-schematic.org" viewBox="-20 -20 40 50">
  <g opens:symbol="true" category="Misc">
    <!-- Document background -->
    <path d="M-15,-20 L5,-20 L15,-10 L15,30 L-15,30 Z" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Folded corner -->
    <path d="M5,-20 L5,-10 L15,-10" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Text lines -->
    <line x1="-10" y1="0" x2="10" y2="0" stroke="currentColor" stroke-width="1.5"/>
    <line x1="-10" y1="10" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/>
    <line x1="-10" y1="20" x2="5" y2="20" stroke="currentColor" stroke-width="1.5"/>
    
    <text x="0" y="45" font-family="sans-serif" font-size="8" text-anchor="middle" opens:name="true">raw_text</text>
    
    <opens:param name="text" value="" multiline="true" />
    <opens:template format="xyce">{{text}}</opens:template>
  </g>
</svg>
